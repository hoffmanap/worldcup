name: Auto-Update World Cup Dashboard

on:
  schedule:
    # Runs every 3 hours during likely active tournament windows (UTC).
    # Adjust to '0 * * * *' (hourly) during the knockout stage.
    - cron: '0 */3 * * *'

  # Lets you manually trigger from the GitHub Actions tab at any time.
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Give the default GITHUB_TOKEN write access so it can push index.html back.
    permissions:
      contents: write

    steps:
      # ── 1. Check out the repository ────────────────────────────────────
      - name: Check out repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ─────────────────────────────────────────
      # statsbombpy is optional — the script degrades gracefully without it.
      # playwright is required for momentum scraping: ESPN renders the
      # momentum chart client-side via React, so a plain HTTP GET never
      # contains the bar elements — only a real rendered browser does.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas playwright
          python -m playwright install --with-deps chromium
          pip install statsbombpy || echo "statsbombpy unavailable — using ESPN fallback"

      # ── 4. Run the dashboard compiler ──────────────────────────────────
      # The script reads index.html (the template), injects MATCH_DATA, and
      # writes index.html back in place.  It exits 1 if no data is compiled,
      # which will surface as a failed Action run for easy debugging.
      - name: Run Dashboard Compiler
        run: python build_dashboard.py

      # ── 5. Commit & push if index.html changed ─────────────────────────
      # [skip ci] on the commit message prevents this push from re-triggering
      # the workflow (avoids infinite loops).
      - name: Commit and push updated dashboard
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"

          if git diff --quiet index.html; then
            echo "No changes to index.html — nothing to commit."
          else
            git add index.html
            git commit -m "ci: auto-update match data [skip ci]"
            git push origin HEAD
          fi
